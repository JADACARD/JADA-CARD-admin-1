<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jada card</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#05050a;color:#fff;min-height:100vh}
.screen{display:none;padding-bottom:90px}
.screen.active{display:block}
.header{padding:25px 20px;text-align:center;background:linear-gradient(135deg,#00f5ff 0%,#ff00ff 100%);font-weight:800;font-size:20px;position:relative}
.back-btn{position:absolute;left:15px;top:18px;font-size:32px;cursor:pointer;color:#00f5ff;text-shadow:0 0 20px #00f5ff;font-weight:900}
.btn{width:90%;margin:18px auto;display:block;padding:16px;background:linear-gradient(135deg,#00f5ff 0%,#ff00ff 100%);border:none;border-radius:15px;color:#000;font-size:17px;font-weight:700;cursor:pointer}
.btn:disabled{background:#222;color:#666;cursor:not-allowed}
input,select{width:90%;margin:12px auto;display:block;padding:15px;background:#12121a;border:2px solid #2a2a3a;border-radius:12px;color:#fff;font-size:16px}
.phone-group{display:flex;width:90%;margin:12px auto;gap:8px}
.phone-group select{width:45%}
.phone-group input{width:55%}
.card{background:#12121a;margin:18px;border-radius:20px;padding:22px;border:1px solid #2a2a3a}
.stat{display:flex;justify-content:space-between;margin:12px 0;color:#8a8a9e}
.scratch-area{width:90%;height:240px;margin:25px auto;background:#1e1e2e;border-radius:25px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#ffcc00;border:4px dashed #00f5ff;cursor:pointer}
.scratch-amount{font-size:32px;margin-top:10px;color:#00ff88}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#0c0c12;border-top:1px solid #2a2a3a;padding:10px 0}
.nav-btn{flex:1;text-align:center;font-size:11px;color:#8a8a9e;cursor:pointer;padding:6px 0}
.nav-btn.active{color:#00f5ff}
.logout{position:absolute;top:22px;right:20px;font-size:24px;cursor:pointer}
.user-card{background:#1a1a2a;margin:10px 0;padding:12px;border-radius:10px}
.req-card{background:rgba(255,204,0,0.1);border:2px solid #ffcc00;margin:10px 0;padding:15px;border-radius:12px;font-size:14px}
.small{font-size:12px;color:#8a8a9e;text-align:center;margin-top:8px}
</style>
</head>
<body>

<div id="login" class="screen active">
  <div class="header">🎴 jada card<br>scratch & win</div>
  <div style="text-align:center;padding:40px;font-size:60px">🎴</div>
  <input id="fullname" placeholder="full name" required>

  <div class="phone-group">
    <select id="countrycodes afrcan countries with flags"></select>
    <input id="phonedigits" placeholder="9 digits" type="tel" maxlength="9" inputmode="numeric">
  </div>

  <button class="btn" onclick="login()">play now</button>
  <div class="small">admin? <button onclick="showscreen('adminlogin')" style="background:none;border:none;color:#00f5ff">login here</button></div>
</div>

<div id="paymentgate" class="screen">
  <div class="header"><span class="back-btn" onclick="backtologin()">←</span>home <span class="logout" onclick="logout()">🚪</span></div>
  <div class="card">welcome <span id="saveduser"></span></div>
  <div class="card">
    <div class="stat"><span>balance</span><span>ugx <span id="balance">0</span></span></div>
    <button class="btn" id="withdrawbtn" onclick="requestwithdraw()" disabled>withdraw - min 50,000</button>
  </div>
  <div class="card">
    <div>ticket price: ugx <span id="ticketprice">5000</span></div>
    <button class="btn" id="paybtn" onclick="payticket()">pay ugx <span id="payamount">5000</span></button>
    <div>status: <span id="paystatus">pending</span></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-btn active" onclick="showscreen('paymentgate')">home</div>
    <div class="nav-btn" onclick="goscratch()">scratch</div>
    <div class="nav-btn" onclick="gowallet()">wallet</div>
    <div class="nav-btn" onclick="gohistory()">history</div>
  </div>
</div>

<div id="scratch" class="screen">
  <div class="header"><span class="back-btn" onclick="showscreen('paymentgate')">←</span>scratch card <span class="logout" onclick="logout()">🚪</span></div>
  <div id="notickets" class="card" style="text-align:center">
    <div style="font-size:50px">🎟️</div>
    <div id="noticketmsg">no tickets</div>
    <button class="btn" onclick="showscreen('paymentgate')">buy ticket</button>
  </div>
  <div id="hasticket" style="display:none">
    <div class="scratch-area" id="scratcharea" onclick="scratchcard()">
      <div>scratch & win</div>
      <div class="scratch-amount">ugx <span id="windisplay">2000</span></div>
      <div style="font-size:14px">tap to scratch</div>
    </div>
    <div id="prize" style="text-align:center;font-size:24px;font-weight:800;margin:25px;display:none"></div>
    <button class="btn" onclick="buyticket()">buy another ticket</button>
  </div>
  <div class="bottom-nav">
    <div class="nav-btn" onclick="showscreen('paymentgate')">home</div>
    <div class="nav-btn active" onclick="showscreen('scratch')">scratch</div>
    <div class="nav-btn" onclick="gowallet()">wallet</div>
    <div class="nav-btn" onclick="gohistory()">history</div>
  </div>
</div>

<div id="wallet" class="screen">
  <div class="header"><span class="back-btn" onclick="showscreen('paymentgate')">←</span>wallet <span class="logout" onclick="logout()">🚪</span></div>
