<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITUKA Investment</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
  body{background:#f5f5f5;color:#333}
  .container{max-width:500px;margin:0 auto;padding:20px}
  .card{background:white;border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
  input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd;font-size:16px}
  button{background:#4CAF50;color:white;border:none;font-weight:bold;cursor:pointer}
  button:hover{background:#45a049}
  .hidden{display:none}
  h2{text-align:center;margin-bottom:15px;color:#4CAF50}
  .balance{font-size:28px;text-align:center;color:#4CAF50;font-weight:bold}
</style>
</head>
<body>
<div class="container">
  <div id="loginScreen" class="card">
    <h2>SITUKA Investment</h2>
    <input type="text" id="name" placeholder="Enter Your Name">
    <input type="tel" id="phone" placeholder="Enter Phone Number">
    <button onclick="login()">Login / Register</button>
  </div>

  <div id="dashboard" class="hidden">
    <div class="card">
      <h2>Welcome, <span id="userName"></span></h2>
      <p>Balance</p>
      <p class="balance" id="balance">UGX 0</p>
    </div>
    <div class="card">
      <h3>Invest</h3>
      <input type="number" id="amount" placeholder="Amount UGX">
      <button onclick="invest()">Invest Now</button>
    </div>
    <button onclick="logout()" style="background:#f44336">Logout</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA7Moc3EHCMkwTVaWJjJXfZCKZAio4hz_o",
    authDomain: "situka-investment.firebaseapp.com",
    databaseURL: "https://situka-investment-default-rtdb.firebaseio.com",
    projectId: "situka-investment",
    storageBucket: "situka-investment.firebasestorage.app",
    messagingSenderId: "448166066076",
    appId: "1:448166066076:web:5e5fe8f043ce7c1843ba59"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.login = async function() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if(!name || !phone) return alert('Please enter Name and Phone');

    const userRef = ref(db, 'users/' + phone);
    const snapshot = await get(userRef);
    
    if(!snapshot.exists()){
      await set(userRef, {name: name, phone: phone, balance: 0});
    }
    
    localStorage.setItem('situka_user', phone);
    showDashboard(name, snapshot.val()?.balance || 0);
  }

  async function showDashboard(name, balance){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('userName').innerText = name;
    document.getElementById('balance').innerText = 'UGX ' + balance.toLocaleString();
  }

  window.invest = async function(){
    const phone = localStorage.getItem('situka_user');
    const amount = parseInt(document.getElementById('amount').value);
    if(!amount || amount < 1000) return alert('Minimum investment 1000 UGX');
    
    const userRef = ref(db, 'users/' + phone);
    const snapshot = await get(userRef);
    const newBalance = (snapshot.val().balance || 0) + amount;
    
    await update(userRef, {balance: newBalance});
    alert('Investment of UGX ' + amount.toLocaleString() + ' added!');
    document.getElementById('amount').value = '';
    showDashboard(snapshot.val().name, newBalance);
  }

  window.logout = function(){
    localStorage.removeItem('situka_user');
    location.reload();
  }

  const savedPhone = localStorage.getItem('situka_user');
  if(savedPhone){
    get(ref(db, 'users/' + savedPhone)).then(snap => {
      if(snap.exists()) showDashboard(snap.val().name, snap.val().balance);
    })
  }
</script>
</body>
</html>
