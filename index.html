
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JADA CARD – Scratch & Win</title>

  <meta property="og:title" content="JADA CARD – Scratch & Win"/>
  <meta property="og:description" content="Scratch your way to UGX 1,000,000!"/>
  <meta property="og:url" content="https://jadacard.github.io"/>
  <meta property="og:type" content="website"/>

  <style>
    body{background:#0a0a0a;color:#fff;font-family:sans-serif;padding:20px;text-align:center}
    h1{color:#ffd700;font-size:32px;margin:40px 0}
    .card{background:#1a1a1a;padding:20px;border-radius:16px;margin:20px auto;max-width:400px}
    button{width:100%;padding:14px;background:#ffd700;color:#000;border:none;border-radius:12px;font-weight:700;font-size:16px;margin:10px 0}
    input{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #333;background:#1a1a1a;color:#fff}
  </style>
</head>
<body>
  <div class="logo">🎫 JadaCard</div>
  <h1>SCRATCH & WIN</h1>
  <p>Win up to UGX 1,000,000</p>

  <div class="card" id="login-screen">
    <h2>Get Started</h2>
    <input type="text" id="name" placeholder="Full Name"/>
    <input type="tel" id="phone" placeholder="Phone Number"/>
    <button onclick="saveUser()">Play Now</button>
    <p style="font-size:12px;opacity:0.5;margin-top:20px">By playing you agree to Terms</p>
  </div>

  <script>
    function saveUser() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      if(name && phone) {
        localStorage.setItem('jada_user', JSON.stringify({name, phone}));
        alert('Saved! Next reload will auto-login. Now build Screen 2-9 in main.js');
      }
    }
    // Auto-login check
    const user = localStorage.getItem('jada_user');
    if(user) {
      document.getElementById('login-screen').innerHTML = '<h2>Welcome back, '+JSON.parse(user).name+'</h2>';
    }
  </script>
</body>
</html>
